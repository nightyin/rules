name: Update financial rules

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-financial-rules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update rule lists
        run: python scripts/update_wise_ifast.py

      - name: Commit and push changes
        run: |
          RULE_LISTS="wise.list ifast.list loqbox.list monzo.list neverless.list n26.list chase.list hsbc.list yonder.list"

          if git diff --quiet -- $RULE_LISTS; then
            echo "No rule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $RULE_LISTS
          git commit -m "Update financial rules"
          git push
