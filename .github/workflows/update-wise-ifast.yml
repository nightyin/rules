name: Update Wise and iFAST rules

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-wise-ifast-rules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update rule lists
        run: python scripts/update_wise_ifast.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- wise.list ifast.list; then
            echo "No rule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wise.list ifast.list
          git commit -m "Update Wise and iFAST rules"
          git push
