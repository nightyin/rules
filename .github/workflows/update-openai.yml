name: Update OpenAI Rules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-openai:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download upstream openai.json (sing branch)
        run: |
          curl -L --fail -o openai.sing.json \
            https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/openai.json

      - name: Build Surge list (openai.list)
        run: |
          python3 openai_json_to_surge.py openai.sing.json openai.list

      - name: Surge normalize (drop DOMAIN-REGEX, add DOMAIN-KEYWORD)
        run: |
          # Surge 不支持 DOMAIN-REGEX：全部删除
          sed -i.bak '/^DOMAIN-REGEX,/d' openai.list

          # 添加更窄的匹配规则（避免重复）
          grep -q '^DOMAIN-KEYWORD,chatgpt-async-webps$' openai.list || \
            echo 'DOMAIN-KEYWORD,chatgpt-async-webps' >> openai.list

          rm -f openai.list.bak

      - name: Remove temporary json
        run: |
          rm -f openai.sing.json

      - name: Commit & Push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add openai.list
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore: update OpenAI rules"
          git push
